                [data-trigger-id].demogeeni-editable-trigger {
                    outline: 1px dashed #013066 !important;
                    box-sizing: border-box !important;
                    pointer-events: none !important;
                }

                [data-trigger-id].demogeeni-editable-trigger.body-hit-enabled {
                    pointer-events: auto !important;
                    background: rgba(13, 148, 136, 0.12) !important;
                    box-shadow:
                        inset 0 0 0 999px rgba(255, 255, 255, 0.035),
                        inset 0 0 24px rgba(13, 148, 136, 0.18) !important;
                    backdrop-filter: blur(1.4px) saturate(1.15);
                    transition: backdrop-filter .3s;
                }

                .demogeeni-trigger-drag-handle {
                    position: absolute;
                    left: -1px;
                    right: -1px;
                    top: -27px;
                    min-height: 25px;
                    z-index: 2147483647;
                    background: rgb(1 49 103);
                    color: #c4c4c4;
                    cursor: move;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font: 8px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                    user-select: none;
                    pointer-events: auto;
                }

                .demogeeni-trigger-drag-label {
                    flex: 1;
                    overflow: hidden;
                    text-overflow: ellipsis;
                    white-space: nowrap;
                    text-align: center;
                    padding: 0 6px;
                }

                .demogeeni-trigger-box-toolbar {
                    position: absolute;
                    top: -62px;
                    right: -1px;
                    display: flex;
                    gap: 4px;
                    width: max-content;
                    padding: 4px;
                    border-radius: 6px;
                    background: rgb(1 49 103);
                    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
                    z-index: 2147483647;
                    pointer-events: auto;
                }

                .demogeeni-trigger-box-toolbar button {
                    width: 22px;
                    height: 22px;
                    border: 0;
                    border-radius: 4px;
                    background: rgba(255, 255, 255, 0.14);
                    color: #dbeafe;
                    cursor: pointer;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 0;
                    pointer-events: auto;
                }

                .demogeeni-trigger-box-toolbar .demogeeni-trigger-delete-btn:hover {
                    background: #ef4444;
                    color: #fff;
                }

                .demogeeni-trigger-box-toolbar .demogeeni-trigger-pointer-events-btn:hover,
                .demogeeni-trigger-box-toolbar .demogeeni-trigger-pointer-events-btn.active {
                    background: #0d9488;
                    color: #fff;
                }

                .demogeeni-trigger-box-toolbar .demogeeni-trigger-clone-btn:hover {
                    background: #7c3aed;
                    color: #fff;
                }

                .demogeeni-trigger-box-toolbar button svg {
                    width: 13px;
                    height: 13px;
                    stroke: currentColor;
                }

                .demogeeni-trigger-resizer {
                    position: absolute;
                    width: 10px;
                    height: 10px;
                    background: #606060;
                    z-index: 2147483647;
                    pointer-events: auto;
                }

                .demogeeni-trigger-resizer.nw {
                    top: -1px;
                    left: -1px;
                    cursor: nw-resize;
                }

                .demogeeni-trigger-resizer.ne {
                    top: -1px;
                    right: -1px;
                    cursor: ne-resize;
                }

                .demogeeni-trigger-resizer.sw {
                    bottom: -1px;
                    left: -1px;
                    cursor: sw-resize;
                }

                .demogeeni-trigger-resizer.se {
                    bottom: -1px;
                    right: -1px;
                    cursor: se-resize;
                }

                [data-trigger-id].demogeeni-editable-trigger:not(.demogeeni-selected-trigger) {
                    outline-color: rgba(239, 68, 68, 0.45) !important;
                    border-color: rgba(239, 68, 68, 0.45) !important;
                }

                [data-trigger-id].demogeeni-selected-trigger {
                    outline-color: #ef4444 !important;
                }
