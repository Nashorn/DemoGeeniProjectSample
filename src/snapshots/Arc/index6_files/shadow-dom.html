        <section class="base64-image-fixture" aria-label="Base64 image export fixtures">
            <figure>

            <figure>

            <figure>

            </figure>
            <figure>
                <div class="base64-layered-background-fixture"></div>
                <figcaption>layered background</figcaption>
            </figure>
        </section>

        <message-bar>
