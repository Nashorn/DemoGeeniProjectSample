<!DOCTYPE html>
<html lang="en">    
<head>
  <meta charset="UTF-8">
  <title>Screenshot Display</title>
  <style>
    .screenshot-display {
        max-width: 1110px; /* Your logical viewport width */
        width: 100%;
        margin: 0 auto; /* Center if desired */
    }

    .screenshot-display img {
        width: 100%;
        height: auto;
        image-rendering: -webkit-optimize-contrast;
        border: 1px solid #ddd; /* Optional styling */
    }
  </style>
</head>
<body>
  <div class="screenshot-display">
    <img src="adp.png" alt="Full page screenshot">
  </div>
</body>
</html>
