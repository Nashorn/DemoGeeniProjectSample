<!DOCTYPE html>
<html lang="en">
<head><base href="../">
<meta charset="utf-8">
<title>Support Chat (iframe under 3 shadow roots)</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0; display: flex; flex-direction: column; height: 100vh;
        background: #fbfcfe; color: #1c2333; font: 13px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    main#thread { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 78%; padding: 8px 11px; border-radius: 12px; }
    .msg.agent { background: #eef1f7; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.me { background: #3b6ff0; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    form#composer {
        display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #e3e7ef; background: #fff;
    }
    input#chat-input {
        flex: 1; padding: 8px 10px; border: 1px solid #dde2ec; border-radius: 7px; font: inherit;
    }
    button#send-btn {
        background: #3b6ff0; color: #fff; border: 0; border-radius: 7px;
        padding: 8px 16px; font: 600 12px -apple-system, sans-serif; cursor: pointer;
    }
    button#send-btn:hover { background: #2f5dd4; }
</style>
</head>
<body>
    <!-- CASE 9 target: this document sits under support-widget >>> chat-panel >>> chat-frame >>> iframe#chat.
         Expected: … >>> >>> >>> iframe#chat ::document html > body > form#composer > button#send-btn -->
    <main id="thread">
        <div class="msg agent">Hi! I'm Aria — how can I help today?</div>
        <div class="msg me">My weekly report iframe was blank after capture 🙃</div>
        <div class="msg agent">Classic. Have you tried recursing into the templates directly?</div>
    </main>
    <form id="composer">
        <input type="text" id="chat-input" placeholder="Type a message…" autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
    </form>
    <script></script>
</body>
</html>
